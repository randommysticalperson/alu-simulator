<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CPU Simulator Suite</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#060c18;color:#c8d8f0;
  font-family:'Courier New',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 20px;
}
h1{font-size:2rem;letter-spacing:5px;color:#7df9ff;
  text-shadow:0 0 20px #7df9ff88;text-transform:uppercase;margin-bottom:8px}
p{font-size:.72rem;letter-spacing:3px;color:#334466;margin-bottom:48px}
.cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.card{
  width:240px;background:#0b1428;border:1px solid #1a3060;
  border-radius:14px;padding:28px 20px;text-align:center;
  text-decoration:none;color:inherit;transition:all .25s;
  display:flex;flex-direction:column;gap:12px;
}
.card:hover{border-color:#7df9ff;box-shadow:0 0 24px #7df9ff33;transform:translateY(-4px)}
.card-icon{font-size:2.4rem}
.card-title{font-size:.85rem;letter-spacing:3px;color:#7df9ff;text-transform:uppercase}
.card-desc{font-size:.65rem;color:#334466;letter-spacing:1px;line-height:1.6}
.badge{
  font-size:.55rem;padding:3px 10px;border-radius:20px;
  border:1px solid #2ed573;color:#2ed573;letter-spacing:2px;
  text-transform:uppercase;align-self:center;
}
</style>
</head>
<body>
<h1>CPU Simulator Suite</h1>
<p>Interactive Digital Logic Simulators</p>
<div class="cards">
  <a class="card" href="alu.html">
    <div class="card-icon">⚙️</div>
    <div class="card-title">ALU</div>
    <div class="card-desc">Arithmetic Logic Unit — 10 operations with live flag output and binary display</div>
    <div class="badge">Interactive</div>
  </a>
  <a class="card" href="latch.html">
    <div class="card-icon">🔒</div>
    <div class="card-title">Control Unit</div>
    <div class="card-desc">SR Latch · D Flip-Flop · JK Flip-Flop · T Flip-Flop · Pipeline Simulator</div>
    <div class="badge">CSS Animated</div>
  </a>
</div>
</body>
</html>
